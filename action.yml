name: "Setup tenv"
description: "Set up tofuutils/tenv with caching and signature verification support"
inputs:
  tenv-version:
    description: "Version of tenv to install (e.g., v4.9.3). Defaults to v4.9.3."
    required: false
    default: "v4.9.3"
  tool:
    description: "Tool to install using tenv (e.g., terraform, tofu, etc.)"
    required: true
  tool-version:
    description: "Version of the tool to install."
    required: true

runs:
  using: "composite"
  steps:
    - name: Restore tool cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.tool_cache }}/cosign
          ${{ runner.tool_cache }}/tenv
        key: setup-tenv-${{ runner.os }}-${{ runner.arch }}-tenv-${{ inputs.tenv-version }}-${{ inputs.tool }}-${{ inputs.tool-version }}

    - name: Check for cached cosign
      id: check-cosign
      shell: bash
      run: |
        ARCH=$(uname -m)
        TOOL_CACHE_DIR="${RUNNER_TOOL_CACHE}/cosign"

        echo "arch=${ARCH}" >> $GITHUB_OUTPUT

        # Look for any version with a .complete marker (convention: <tool>/<version>/<arch>.complete)
        FOUND=false
        if [ -d "${TOOL_CACHE_DIR}" ]; then
          for VERSION_DIR in "${TOOL_CACHE_DIR}"/*/; do
            if [ -f "${VERSION_DIR}${ARCH}.complete" ] && [ -x "${VERSION_DIR}${ARCH}/cosign" ]; then
              echo "Found cached cosign at ${VERSION_DIR}${ARCH}/cosign"
              echo "install-dir=${VERSION_DIR}${ARCH}" >> $GITHUB_OUTPUT
              FOUND=true
              break
            fi
          done
        fi

        if [ "${FOUND}" != "true" ]; then
          # Prepare install dir for cosign-installer (version will be resolved after install)
          INSTALL_DIR="${TOOL_CACHE_DIR}/pending/${ARCH}"
          mkdir -p "${INSTALL_DIR}"
          echo "No cached cosign found"
          echo "install-dir=${INSTALL_DIR}" >> $GITHUB_OUTPUT
        fi

        echo "found=${FOUND}" >> $GITHUB_OUTPUT

    - name: Install cosign
      if: steps.check-cosign.outputs.found != 'true'
      uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
      with:
        cosign-release: v3.0.5
        install-dir: ${{ steps.check-cosign.outputs.install-dir }}

    - name: Register cosign in tool cache
      if: steps.check-cosign.outputs.found != 'true'
      id: register-cosign
      shell: bash
      run: |
        ARCH="${{ steps.check-cosign.outputs.arch }}"
        PENDING_DIR="${RUNNER_TOOL_CACHE}/cosign/pending/${ARCH}"
        INSTALLED_VERSION=$("${PENDING_DIR}/cosign" version 2>&1 | grep -o 'GitVersion:[^,]*' | cut -d':' -f2 | xargs)
        INSTALLED_VERSION="${INSTALLED_VERSION#v}"

        # Move to conventional path: <tool>/<version>/<arch>/
        TARGET_DIR="${RUNNER_TOOL_CACHE}/cosign/${INSTALLED_VERSION}/${ARCH}"
        mkdir -p "${TARGET_DIR}"
        mv "${PENDING_DIR}/cosign" "${TARGET_DIR}/cosign"
        rm -rf "${RUNNER_TOOL_CACHE}/cosign/pending"

        # Create the .complete sentinel
        touch "${RUNNER_TOOL_CACHE}/cosign/${INSTALLED_VERSION}/${ARCH}.complete"

        echo "Registered cosign ${INSTALLED_VERSION} in tool cache"
        echo "install-dir=${TARGET_DIR}" >> $GITHUB_OUTPUT

    - name: Add cosign to path
      shell: bash
      run: |
        if [ "${{ steps.check-cosign.outputs.found }}" == "true" ]; then
          echo "${{ steps.check-cosign.outputs.install-dir }}" >> $GITHUB_PATH
        else
          echo "${{ steps.register-cosign.outputs.install-dir }}" >> $GITHUB_PATH
        fi

    - name: Check for cached tenv
      id: check-tenv
      shell: bash
      run: |
        # Determine OS and architecture (must match tenv release asset naming)
        OS=$(uname -s)
        ARCH=$(uname -m)
        case "${ARCH}" in
          aarch64)
            ARCH="arm64"
            ;;
        esac

        REQUESTED_VERSION="${{ inputs.tenv-version }}"
        NORMALIZED_VERSION="${REQUESTED_VERSION#v}"

        # Tool cache convention: <tool>/<version>/<arch>/
        INSTALL_DIR="${RUNNER_TOOL_CACHE}/tenv/${NORMALIZED_VERSION}/${ARCH}"
        TENV_ROOT_DIR="${INSTALL_DIR}/root"
        TENV_BIN_DIR="${INSTALL_DIR}/bin"
        TENV_PATH="${TENV_BIN_DIR}/tenv"
        COMPLETE_MARKER="${RUNNER_TOOL_CACHE}/tenv/${NORMALIZED_VERSION}/${ARCH}.complete"

        echo "install-dir=${INSTALL_DIR}" >> $GITHUB_OUTPUT
        echo "bin-dir=${TENV_BIN_DIR}" >> $GITHUB_OUTPUT
        echo "tenv-root=${TENV_ROOT_DIR}" >> $GITHUB_OUTPUT
        echo "os=${OS}" >> $GITHUB_OUTPUT
        echo "arch=${ARCH}" >> $GITHUB_OUTPUT
        echo "requested-version=${REQUESTED_VERSION}" >> $GITHUB_OUTPUT

        if [ -f "${COMPLETE_MARKER}" ] && [ -f "${TENV_PATH}" ] && [ -x "${TENV_PATH}" ]; then
          echo "Found cached tenv ${NORMALIZED_VERSION} at ${TENV_BIN_DIR}"
          echo "found=true" >> $GITHUB_OUTPUT
        else
          echo "No cached tenv ${NORMALIZED_VERSION} found"
          echo "found=false" >> $GITHUB_OUTPUT
          mkdir -p "${TENV_BIN_DIR}"
        fi

    - name: Download and verify tenv
      if: steps.check-tenv.outputs.found != 'true'
      shell: bash
      run: |
        # Set variables
        BIN_DIR="${{ steps.check-tenv.outputs.bin-dir }}"
        OS="${{ steps.check-tenv.outputs.os }}"
        ARCH="${{ steps.check-tenv.outputs.arch }}"
        REQUESTED_VERSION="${{ steps.check-tenv.outputs.requested-version }}"
        TEMP_DIR=$(mktemp -d)

        # Determine which version to download
        if [ -z "${REQUESTED_VERSION}" ]; then
          TENV_VERSION=$(curl -s https://api.github.com/repos/tofuutils/tenv/releases/latest | grep -o '"tag_name": ".*"' | cut -d'"' -f4)
        else
          # Keep the 'v' prefix for GitHub releases if it doesn't exist
          if [[ "${REQUESTED_VERSION}" == v* ]]; then
            TENV_VERSION="${REQUESTED_VERSION}"
          else
            TENV_VERSION="v${REQUESTED_VERSION}"
          fi
        fi

        # Download tenv archive and verification files
        echo "Downloading tenv ${TENV_VERSION} for ${OS}_${ARCH}..."
        TARBALL_NAME="tenv_${TENV_VERSION}_${OS}_${ARCH}.tar.gz"
        RELEASE_URL="https://github.com/tofuutils/tenv/releases/download/${TENV_VERSION}"

        # Download the tarball and its signature files
        curl -sL -o "${TEMP_DIR}/${TARBALL_NAME}" "${RELEASE_URL}/${TARBALL_NAME}"
        curl -sL -o "${TEMP_DIR}/${TARBALL_NAME}.sig" "${RELEASE_URL}/${TARBALL_NAME}.sig"
        curl -sL -o "${TEMP_DIR}/${TARBALL_NAME}.pem" "${RELEASE_URL}/${TARBALL_NAME}.pem"

        # Download checksums and signature files
        CHECKSUMS_FILE="tenv_${TENV_VERSION}_checksums.txt"
        curl -sL -o "${TEMP_DIR}/${CHECKSUMS_FILE}" "${RELEASE_URL}/${CHECKSUMS_FILE}"
        curl -sL -o "${TEMP_DIR}/${CHECKSUMS_FILE}.sig" "${RELEASE_URL}/${CHECKSUMS_FILE}.sig"
        curl -sL -o "${TEMP_DIR}/${CHECKSUMS_FILE}.pem" "${RELEASE_URL}/${CHECKSUMS_FILE}.pem"

        # Verify checksums signature
        echo "Verifying checksums signature..."
        cosign verify-blob \
          --certificate-identity "https://github.com/tofuutils/tenv/.github/workflows/release.yml@refs/tags/${TENV_VERSION}" \
          --signature "${TEMP_DIR}/${CHECKSUMS_FILE}.sig" \
          --certificate "${TEMP_DIR}/${CHECKSUMS_FILE}.pem" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
          "${TEMP_DIR}/${CHECKSUMS_FILE}"

        # Verify tarball signature
        echo "Verifying tarball signature..."
        cosign verify-blob \
          --certificate-identity "https://github.com/tofuutils/tenv/.github/workflows/release.yml@refs/tags/${TENV_VERSION}" \
          --signature "${TEMP_DIR}/${TARBALL_NAME}.sig" \
          --certificate "${TEMP_DIR}/${TARBALL_NAME}.pem" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
          "${TEMP_DIR}/${TARBALL_NAME}"

        # Verify tarball against checksums
        echo "Verifying tarball against checksums..."
        pushd "${TEMP_DIR}" > /dev/null
        shasum -a 256 --check <(grep "${TARBALL_NAME}" "${CHECKSUMS_FILE}")
        popd > /dev/null

        # Extract tenv and tool symlinks into install directory
        echo "Extracting tenv..."
        mkdir -p "${BIN_DIR}"
        tar -xzf "${TEMP_DIR}/${TARBALL_NAME}" -C "${BIN_DIR}" --exclude='LICENSE' --exclude='README.md' --exclude='CHANGELOG.md'
        chmod +x "${BIN_DIR}/tenv"
        echo "Installed tenv ${TENV_VERSION} to ${BIN_DIR}"
        rm -rf "${TEMP_DIR}"

        # Create the .complete sentinel
        NORMALIZED_VERSION="${REQUESTED_VERSION#v}"
        touch "${RUNNER_TOOL_CACHE}/tenv/${NORMALIZED_VERSION}/${ARCH}.complete"

    - name: Add tenv to path
      shell: bash
      run: |
        echo "${{ steps.check-tenv.outputs.bin-dir }}" >> $GITHUB_PATH

    - name: Set TENV_ROOT
      shell: bash
      run: |
        echo "TENV_ROOT=${{ steps.check-tenv.outputs.tenv-root }}" >> $GITHUB_ENV

    - name: Install tool with tenv
      shell: bash
      env:
        TOOL_NAME: ${{ inputs.tool }}
        TOOL_VERSION: ${{ inputs.tool-version }}
        TENV_GITHUB_TOKEN: ${{ github.token }}
      run: |
        tenv $TOOL_NAME install $TOOL_VERSION
