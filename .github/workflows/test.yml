name: Test setup-tenv
on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.tool }} on ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        tool: [tofu, terraform]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup tenv
        uses: ./
        with:
          tool: ${{ matrix.tool }}
          tool-version: latest
      - name: Verify tenv
        run: |
          which tenv
          tenv version
      - name: Verify tool
        env:
          TOOL_NAME: ${{ matrix.tool }}
        run: |
          which "$TOOL_NAME"
          "$TOOL_NAME" version
